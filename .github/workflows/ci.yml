name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Lint (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [eph-linux-x64, eph-linux-arm64, eph-macos-arm64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just lint
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  # The default test cell — fast feedback for PR authors. The full charter
  # matrix runs in parallel below.
  test:
    name: Test (orc/release/threads:on) (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [eph-linux-x64, eph-linux-arm64, eph-macos-arm64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.runner }}
          path: test-logs/
          retention-days: 30

  # Charter matrix — memory manager × compile mode × threading. Each cell
  # runs as a separate matrix entry so failures show up granularly and
  # parallelism is maximised.
  charter-matrix:
    name: Charter (${{ matrix.mm }}/${{ matrix.mode }}/threads:${{ matrix.threads }}) (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [eph-linux-x64, eph-linux-arm64, eph-macos-arm64]
        mm: [arc, orc, refc]
        mode: [debug, release, danger]
        threads: [on, off]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just _matrix ${{ matrix.mm }} ${{ matrix.mode }} ${{ matrix.threads }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: charter-${{ matrix.mm }}-${{ matrix.mode }}-${{ matrix.threads }}-${{ matrix.runner }}-logs
          path: test-logs/
          retention-days: 30

  # Sanitizer matrix — Linux only. clang-driven; each sanitizer in its own
  # cell so a single sanitizer regression doesn't mask others.
  sanitizers:
    name: Sanitizer (${{ matrix.kind }})
    # Linux-only (clang sanitizers); mapped to the Linux AMD64 Nix class.
    runs-on: eph-linux-x64
    strategy:
      fail-fast: false
      matrix:
        kind: [asan, ubsan, tsan, lsan]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test-${{ matrix.kind }}
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-${{ matrix.kind }}-logs
          path: test-logs/
          retention-days: 30

  # Valgrind — secondary leak verification beyond LSan.
  valgrind:
    name: Valgrind
    # Linux-only (valgrind); mapped to the Linux AMD64 Nix class.
    runs-on: eph-linux-x64
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test-valgrind
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: valgrind-logs
          path: test-logs/
          retention-days: 30

  # macOS parity check.
  test-macos:
    name: Test (macOS)
    runs-on: eph-macos-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-logs
          path: test-logs/
          retention-days: 30

  # Heavy-weight 100k-cycle leak budget — only on main, doesn't block PRs.
  test-leaks-heavy:
    name: Heavy leak budgets (100k cycles)
    if: github.ref == 'refs/heads/main'
    # Linux-only leak-budget toolchain; mapped to the Linux AMD64 Nix class.
    runs-on: eph-linux-x64
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix develop --command just test-leaks-heavy
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leaks-heavy-logs
          path: test-logs/
          retention-days: 30

  # nix build of the package.
  nix-build:
    name: nix build (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [eph-linux-x64, eph-linux-arm64, eph-macos-arm64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          nix-github-token: ${{ secrets.GITHUB_TOKEN }}
      - run: nix build .#default
